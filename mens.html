<script>
    // ・・・前略（API_URLなどはそのまま）・・・

    async function submitScore() {
        const id = document.getElementById('matchSelect').value; 
        const pair = getTeamNames(id);
        const btn = document.getElementById('btnSubmit');
        
        // 入力値を取得（空欄なら0にする）
        const t1h1 = parseInt(document.getElementById('t1h1').value, 10) || 0;
        const t1h2 = parseInt(document.getElementById('t1h2').value, 10) || 0;
        const t2h1 = parseInt(document.getElementById('t2h1').value, 10) || 0;
        const t2h2 = parseInt(document.getElementById('t2h2').value, 10) || 0;

        // 合計を計算
        const s1_total = t1h1 + t1h2;
        const s2_total = t2h1 + t2h2;

        let win, lose;
        if(document.getElementById('winT1').checked) { win = pair[0]; lose = pair[1]; }
        else if(document.getElementById('winT2').checked) { win = pair[1]; lose = pair[0]; }
        else { alert("勝者を選択してください"); return; }
        
        btn.disabled = true; btn.innerText = "送信中...";

        await fetch(API_URL, { method: "POST", body: JSON.stringify({
            gender: 'men',
            matchId: id,
            winner: win,
            loser: lose,
            s1_total: s1_total,
            s2_total: s2_total,
            t1_h1: t1h1, 
            t1_h2: t1h2,
            t2_h1: t2h1, 
            t2_h2: t2h2
        })});
        location.reload();
    }
    // ・・・後略 ・・・
</script>
